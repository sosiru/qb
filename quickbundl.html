<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quick Bundl — Payments OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F3ED;
    --surface:#FFFFFF;
    --surface-sunk:#F1EEE5;
    --surface-hover:#FAF9F4;
    --line:#E5E0D3;
    --line-soft:#EEEAE0;
    --ink:#12181A;
    --ink-soft:#454E49;
    --slate:#767E78;
    --slate-soft:#A3A99E;

    --brand-900:#072A20;
    --brand-800:#0A4A38;
    --brand-700:#0D6B4F;
    --brand-600:#0F9468;
    --brand-500:#17B67D;
    --brand-400:#4FD79D;
    --brand-100:#D9F3E7;
    --brand-050:#EEFAF3;

    --amber-700:#B4640A;
    --amber-500:#F0A93A;
    --amber-100:#FBEBCE;

    --red-700:#C23A26;
    --red-500:#EC5B41;
    --red-100:#FAE2DC;

    --blue-700:#1E4FCB;
    --blue-500:#4C7CF2;
    --blue-100:#E1E9FC;

    --violet-700:#6A3FC7;
    --violet-500:#8B63EE;
    --violet-100:#EDE5FD;

    /* chart accent palette — distinct hues, not shades of one color, so charts read vivid */
    --chart-1:#0F9468;
    --chart-2:#F0A93A;
    --chart-3:#4C7CF2;
    --chart-4:#8B63EE;
    --chart-5:#EC5B41;
    --chart-track:#EAE6D9;

    --radius-lg:16px;
    --radius-md:12px;
    --radius-sm:8px;
    --ease: cubic-bezier(.2,.7,.3,1);

    /* layered, low-contrast elevation — closer to Stripe/Fluent than a single hard drop shadow */
    --shadow-xs: 0 1px 1px rgba(16,20,18,0.04);
    --shadow-card: 0 0 0 1px rgba(16,20,18,0.03), 0 1px 2px rgba(16,20,18,0.04), 0 8px 24px -12px rgba(16,20,18,0.12);
    --shadow-card-hover: 0 0 0 1px rgba(16,20,18,0.04), 0 2px 4px rgba(16,20,18,0.05), 0 16px 36px -14px rgba(16,20,18,0.16);
    --shadow-pop: 0 14px 34px -8px rgba(15,148,104,0.34), 0 4px 10px -4px rgba(7,42,32,0.28);
    --shadow-ring: 0 0 0 3px var(--brand-100), 0 0 0 1px var(--brand-500);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    font-size:13.5px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .num, .mono{ font-family:'JetBrains Mono', ui-monospace, monospace; letter-spacing:-0.01em; }
  .display{ font-family:'Fraunces', serif; }
  h1,h2,h3,h4{ margin:0; font-family:'Fraunces', serif; font-weight:600; letter-spacing:-0.01em; }
  p{margin:0;}
  a{color:inherit;}
  button{font-family:inherit;}
  ::selection{ background:var(--brand-100); }

  button, input, select{ outline:none; }
  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    box-shadow:var(--shadow-ring);
    border-radius:8px;
  }

  #root{ min-height:100vh; }

  /* ---------- scrollbars ---------- */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#DCD8CC; border-radius:20px; border:2px solid var(--paper); }
  ::-webkit-scrollbar-track{ background:transparent; }

  /* ================= AUTH ================= */
  .auth-wrap{
    min-height:100vh; display:grid; grid-template-columns: minmax(0,460px) 1fr;
    background:var(--surface);
  }
  @media (max-width: 860px){ .auth-wrap{ grid-template-columns: 1fr; } .auth-side{ display:none; } }

  .auth-form{ padding:56px 56px; display:flex; flex-direction:column; min-height:100vh; }
  .auth-brand{ display:flex; align-items:center; gap:10px; margin-bottom:56px; }
  .auth-brand .mark{ width:34px; height:34px; border-radius:9px; background:var(--brand-800); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:700; font-size:14px; }
  .auth-brand .name{ font-weight:700; font-size:15px; letter-spacing:-0.01em; }
  .auth-brand .sub{ font-size:10px; letter-spacing:0.12em; color:var(--slate); text-transform:uppercase; margin-top:1px; }

  .auth-body{ max-width:340px; flex:1; }
  .step-tag{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--brand-600); font-weight:600; margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .step-tag .dot-sep{ color:var(--line); }
  .auth-body h1{ font-size:26px; margin-bottom:8px; color:var(--ink); }
  .auth-body .desc{ color:var(--slate); font-size:13.5px; margin-bottom:30px; }

  .field{ margin-bottom:18px; }
  .field label{ display:flex; justify-content:space-between; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); font-weight:600; margin-bottom:7px; }
  .field label a{ color:var(--brand-600); text-transform:none; letter-spacing:0; font-weight:600; cursor:pointer; }
  .field input{
    width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--line);
    background:var(--surface); font-size:14px; color:var(--ink); font-family:'JetBrains Mono', monospace;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus{ border-color:var(--brand-500); }

  .btn{
    appearance:none; border:none; cursor:pointer; border-radius:10px; font-weight:600;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .12s var(--ease), background .18s var(--ease), box-shadow .18s var(--ease), border-color .18s var(--ease), color .18s var(--ease);
    white-space:nowrap;
  }
  .btn:active{ transform:translateY(1px) scale(.99); }
  .btn-primary{ background:linear-gradient(155deg, var(--brand-700), var(--brand-800)); color:#fff; padding:12px 18px; font-size:14px; width:100%; box-shadow: var(--shadow-pop); }
  .btn-primary:hover{ background:linear-gradient(155deg, var(--brand-600), var(--brand-700)); box-shadow:0 14px 36px -8px rgba(10,52,43,0.38), 0 4px 10px -4px rgba(10,52,43,0.26); }
  .btn-dark{ background:var(--ink); color:#fff; padding:9px 14px; font-size:13px; }
  .btn-dark:hover{ background:#26302B; }
  .btn-ghost{ background:var(--surface); color:var(--ink); border:1.5px solid var(--line); padding:9px 14px; font-size:13px; }
  .btn-ghost:hover{ border-color:var(--slate-soft); background:var(--surface-hover); }
  .btn-sm{ padding:7px 11px; font-size:12px; border-radius:8px; }
  .btn-link{ background:none; border:none; color:var(--brand-600); font-weight:600; cursor:pointer; font-size:13px; padding:0; }
  .btn-link:hover{ text-decoration:underline; }
  .btn[disabled]{ opacity:.5; cursor:not-allowed; }

  .auth-foot{ display:flex; justify-content:space-between; align-items:center; font-size:11.5px; color:var(--slate-soft); padding-top:24px; flex-wrap:wrap; gap:10px;}
  .auth-foot a{ color:var(--slate); text-decoration:none; margin-right:14px; }
  .status-chip{ display:inline-flex; align-items:center; gap:6px; color:var(--brand-600); font-weight:600; }
  .status-chip .pulse{ width:6px; height:6px; border-radius:50%; background:var(--brand-500); box-shadow:0 0 0 0 rgba(28,136,112,.5); animation:pulse 2s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(28,136,112,.45)} 70%{box-shadow:0 0 0 6px rgba(28,136,112,0)} 100%{box-shadow:0 0 0 0 rgba(28,136,112,0)} }

  .auth-side{
    background:
      radial-gradient(1000px 600px at 100% 0%, rgba(255,255,255,0.05), transparent 60%),
      linear-gradient(155deg, var(--brand-900) 0%, #0A2B24 55%, #081F1A 100%);
    color:#fff; padding:60px 56px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden;
  }
  .auth-side::before{
    content:''; position:absolute; inset:0; opacity:0.5;
    background-image: linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at 70% 20%, black, transparent 75%);
  }
  .auth-side > *{ position:relative; z-index:1; }
  .eyebrow{ font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#8FCBB8; font-weight:600; margin-bottom:18px; }
  .auth-side h2{ font-size:34px; line-height:1.18; font-weight:500; max-width:480px; margin-bottom:40px; }
  .side-card{ background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:20px; margin-bottom:14px; backdrop-filter:blur(6px); }
  .side-card .ic{ width:32px; height:32px; border-radius:9px; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
  .side-card h4{ font-family:'Inter'; font-size:14.5px; font-weight:700; margin-bottom:6px; }
  .side-card p{ font-size:12.5px; color:#C6D9D2; line-height:1.5; }
  .trust-line{ font-family:'JetBrains Mono', monospace; font-size:11.5px; color:#7FA99B; letter-spacing:0.01em; }

  .otp-row{ display:flex; gap:9px; margin-bottom:8px; }
  .otp-box{ width:46px; height:54px; border-radius:10px; border:1.5px solid var(--line); text-align:center; font-size:20px; font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--ink); background:var(--surface); }
  .otp-box:focus{ border-color:var(--brand-500); }
  .otp-meta{ display:flex; justify-content:space-between; font-size:12px; color:var(--slate); margin-bottom:26px; }

  /* ================= APP SHELL ================= */
  .shell{ display:flex; min-height:100vh; }
  .sidebar{
    width:246px; flex:none; background:var(--surface); border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:18px 14px; position:sticky; top:0; height:100vh;
    z-index:40;
  }
  .brand-row{ display:flex; align-items:center; gap:10px; padding:6px 8px 22px; }
  .brand-row .mark{ width:32px; height:32px; border-radius:9px; background:var(--brand-800); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:700; font-size:13px; flex:none; }
  .brand-row .name{ font-weight:700; font-size:14.5px; letter-spacing:-0.01em; line-height:1.1; }
  .brand-row .sub{ font-size:9.5px; letter-spacing:0.12em; color:var(--slate); text-transform:uppercase; margin-top:2px; }

  .nav-label{ font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--slate-soft); font-weight:700; padding:14px 10px 8px; }
  .nav-item{
    display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:9px; color:var(--ink-soft);
    cursor:pointer; font-size:13.3px; font-weight:500; position:relative; margin-bottom:2px; transition:background .15s ease, color .15s ease;
  }
  .nav-item svg{ flex:none; opacity:.85; }
  .nav-item:hover{ background:var(--surface-sunk); color:var(--ink); }
  .nav-item.active{ background:var(--brand-050); color:var(--brand-800); font-weight:600; }
  .nav-item.active svg{ opacity:1; color: var(--brand-700); }
  .nav-badge{ margin-left:auto; background:var(--amber-700); color:#fff; font-size:10.5px; font-weight:700; padding:1px 7px; border-radius:20px; font-family:'JetBrains Mono',monospace; }
  .nav-divider{ height:1px; background:var(--line-soft); margin:14px 4px; }

  .sidebar-foot{ margin-top:auto; padding-top:12px; }
  .org-pill{ display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:10px; background:var(--surface-sunk); font-size:11.5px; }
  .org-pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--brand-500); flex:none; }
  .org-pill .lab{ color:var(--slate); font-size:9.5px; text-transform:uppercase; letter-spacing:0.1em; }
  .org-pill .val{ font-weight:600; color:var(--ink); }

  .topbar{
    height:64px; flex:none; display:flex; align-items:center; gap:14px; padding:0 26px; border-bottom:1px solid var(--line);
    background:rgba(245,243,238,0.85); backdrop-filter:blur(8px); position:sticky; top:0; z-index:30;
  }
  .hamburger{ display:none; }
  .org-switch{ display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:10px; border:1px solid var(--line); background:var(--surface); cursor:pointer; }
  .org-switch .ic{ width:26px; height:26px; border-radius:7px; background:var(--surface-sunk); display:flex; align-items:center; justify-content:center; }
  .org-switch .lab{ font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--slate); }
  .org-switch .val{ font-size:13px; font-weight:600; }

  .topbar-spacer{ flex:1; }
  .role-wrap{ position:relative; }
  .role-select{
    display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; cursor:pointer;
    border:1.5px solid var(--brand-500); color:var(--brand-700); background:var(--brand-050); font-weight:700; font-size:12.5px;
  }
  .role-menu{
    position:absolute; top:calc(100% + 8px); right:0; background:var(--surface); border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow-card); width:200px; padding:6px; display:none; z-index:50;
  }
  .role-menu.open{ display:block; }
  .role-menu .opt{ padding:9px 10px; border-radius:8px; font-size:12.8px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
  .role-menu .opt:hover{ background:var(--surface-sunk); }
  .role-menu .opt.sel{ color:var(--brand-700); font-weight:700; }

  .bell{ width:36px; height:36px; border-radius:10px; border:1px solid var(--line); background:var(--surface); display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; }
  .bell .rd{ position:absolute; top:8px; right:8px; width:6px; height:6px; border-radius:50%; background:var(--amber-700); }
  .avatar-row{ display:flex; align-items:center; gap:10px; padding-left:6px; }
  .avatar{ width:34px; height:34px; border-radius:9px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
  .avatar-name{ font-size:12.8px; font-weight:700; line-height:1.2; }
  .avatar-role{ font-size:9.5px; color:var(--slate); text-transform:uppercase; letter-spacing:0.08em; }

  .main{ flex:1; min-width:0; }
  .page{ padding:30px 32px 60px; max-width:1360px; animation: rise .28s ease; }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .eyebrow-lab{ font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--slate); font-weight:700; margin-bottom:6px; }
  .page-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:26px; flex-wrap:wrap; }
  .page-head h1{ font-size:25px; color:var(--ink); margin-bottom:6px; }
  .page-head .desc{ color:var(--slate); font-size:13px; max-width:560px; }
  .head-actions{ display:flex; gap:10px; }

  .grid{ display:grid; gap:18px; }
  .cols-3{ grid-template-columns: repeat(3,1fr); }
  .cols-2{ grid-template-columns: 2fr 1fr; }
  @media (max-width: 980px){ .cols-3{ grid-template-columns:1fr 1fr; } .cols-2{ grid-template-columns:1fr; } }
  @media (max-width: 680px){ .cols-3{ grid-template-columns:1fr; } }

  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:22px; box-shadow:var(--shadow-card); transition:box-shadow .25s var(--ease), border-color .25s var(--ease); }
  .card.tight{ padding:16px 18px; }
  .card:hover{ box-shadow:var(--shadow-card-hover); }
  .card-hero{
    background: linear-gradient(155deg, var(--brand-800) 0%, var(--brand-900) 65%, #082019 100%);
    color:#fff; border:none; position:relative; overflow:hidden;
  }
  .card-hero::after{ content:''; position:absolute; right:-40px; bottom:-60px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%); }
  .card-hero::before{ content:''; position:absolute; inset:0; opacity:.5; background-image:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px); background-size:34px 34px; mask-image:radial-gradient(circle at 85% 15%, black, transparent 70%); }
  .card-hero > *{ position:relative; z-index:1; }
  .stat-lab{ font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--slate); font-weight:700; margin-bottom:12px; }
  .card-hero .stat-lab{ color:#9FD3C1; }
  .stat-num{ font-size:30px; font-weight:600; margin-bottom:6px; }
  .stat-sub{ font-size:12px; color:var(--slate); }
  .card-hero .stat-sub{ color:#B9DED2; }
  .stat-num.amber{ color:var(--amber-700); }

  .section-title{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-title h3{ font-size:16px; font-weight:600; }
  .section-title .link{ font-size:12.5px; font-weight:700; color:var(--brand-600); cursor:pointer; }

  .list-row{ display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line-soft); gap:14px; }
  .list-row:last-child{ border-bottom:none; padding-bottom:2px; }
  .list-row .lname{ font-weight:600; font-size:13.6px; margin-bottom:3px; }
  .list-row .lmeta{ font-size:11.8px; color:var(--slate); }
  .list-row .lamt{ text-align:right; font-weight:700; font-size:13.8px; }
  .list-row .lamt .sub{ font-weight:500; color:var(--slate); font-size:11px; margin-top:2px; }

  .qa-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .qa-btn{ display:flex; flex-direction:column; align-items:flex-start; gap:16px; padding:14px; border-radius:12px; border:1px solid var(--line); background:var(--surface); cursor:pointer; font-weight:700; font-size:12.8px; color:var(--ink); text-align:left; transition:all .15s ease;}
  .qa-btn:hover{ border-color:var(--brand-500); background:var(--brand-050); }
  .qa-btn.dark{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .qa-btn .ic{ width:30px; height:30px; border-radius:8px; background:var(--surface-sunk); display:flex; align-items:center; justify-content:center; }
  .qa-btn.dark .ic{ background:rgba(255,255,255,0.12); }

  .progress-track{ height:8px; border-radius:20px; background:var(--surface-sunk); overflow:hidden; margin:10px 0; }
  .progress-fill{ height:100%; border-radius:20px; background:linear-gradient(90deg, var(--brand-600), var(--brand-500)); transition:width .5s ease; }

  /* ---------- charts ---------- */
  .chart-card-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:6px; }
  .chart-card-head h3{ font-size:15.5px; font-weight:600; margin-bottom:3px; }
  .chart-card-head .chart-sub{ font-size:11.8px; color:var(--slate); }
  .chart-total-pill{ text-align:right; flex:none; }
  .chart-total-pill .v{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; color:var(--ink); }
  .chart-total-pill .l{ font-size:10.5px; color:var(--slate); text-transform:uppercase; letter-spacing:.08em; margin-top:1px; }

  .donut-wrap{ position:relative; display:flex; align-items:center; justify-content:center; margin:6px auto 4px; }
  .donut-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; pointer-events:none; }
  .donut-center .v{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:19px; color:var(--ink); line-height:1.1; }
  .donut-center .l{ font-size:9.8px; color:var(--slate); text-transform:uppercase; letter-spacing:.08em; margin-top:3px; }

  .chart-legend{ display:flex; flex-direction:column; gap:9px; margin-top:14px; }
  .chart-legend .lg-row{ display:flex; align-items:center; gap:9px; font-size:12.4px; }
  .chart-legend .lg-row .dot{ width:8px; height:8px; border-radius:2.5px; flex:none; }
  .chart-legend .lg-row .name{ flex:1; color:var(--ink-soft); font-weight:600; }
  .chart-legend .lg-row .val{ font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--ink); }
  .chart-legend .lg-row .pct{ color:var(--slate); font-size:11px; width:34px; text-align:right; }

  .chart-canvas-box{ position:relative; width:100%; }
  .trend-toggle{ display:flex; gap:4px; background:var(--surface-sunk); border-radius:9px; padding:3px; }
  .trend-toggle span{ padding:5px 10px; border-radius:7px; font-size:11.3px; font-weight:700; color:var(--slate); cursor:pointer; }
  .trend-toggle span.on{ background:var(--surface); color:var(--brand-700); box-shadow:var(--shadow-xs); }

  .bar-chart{
    display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
    height:190px; margin-top:12px; padding:0 2px 2px;
    background-image: repeating-linear-gradient(to top, var(--line-soft) 0, var(--line-soft) 1px, transparent 1px, transparent 25%);

function money(n){

function el(html){ const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; }
function toast(msg, kind){
  const host = document.getElementById('toast-host');
  const node = el(`<div class="toast ${kind==='err'?'err':''}"><span class="d"></span>${msg}</div>`);
  host.appendChild(node);
  setTimeout(()=>{ node.style.transition='opacity .25s ease'; node.style.opacity='0'; setTimeout(()=>node.remove(),250); }, 2600);
}
function badge(status){
  const map = {
    'Active':'green','Succeeded':'green','Approved':'green','Ready':'green',
    'Pending approval':'amber','Processing':'blue',
    'Revoked':'red','Inactive':'gray','Expired':'gray'
  };
  const cls = map[status] || 'gray';
  return `<span class="badge badge-${cls}"><span class="d"></span>${status}</span>`;
}

/* ============================ CHARTS (dependency-free: pure SVG + CSS) ============================ */
function donutSVG(data){
  const total = data.reduce((s,d)=>s+d.value,0);
  const r = 15.9155; // circumference ≈ 100, classic 0-100 donut trick
  let acc = 0;
  const segs = data.map(d=>{
    const pct = (d.value/total*100);
    const dash = `${Math.max(pct-1.4,0.001)} ${100-Math.max(pct-1.4,0.001)}`;
    const rotate = (acc/100*360) - 90;
    acc += pct;
    return `<circle cx="18" cy="18" r="${r}" fill="none" style="stroke:${d.color}" stroke-width="4.6" stroke-linecap="round" stroke-dasharray="${dash}" transform="rotate(${rotate} 18 18)"/>`;
  }).join('');
  return `<svg viewBox="0 0 36 36" width="180" height="180" style="display:block;">
    <circle cx="18" cy="18" r="${r}" fill="none" style="stroke:var(--chart-track)" stroke-width="4.6"/>
    ${segs}
  </svg>`;
}

function barChartHTML(data){
  const max = Math.max(...data.flatMap(d=>[d.income,d.spend])) * 1.1;
  return `
  <div class="bar-chart">
    ${data.map(d=>{
      const hIncome = (d.income/max*100).toFixed(1);
      const hSpend = (d.spend/max*100).toFixed(1);
      return `
      <div class="bar-group">
        <div class="bar-pair">
          <div class="bar income" style="height:${hIncome}%" title="Income · KES ${money(d.income)}"></div>
          <div class="bar outgoing" style="height:${hSpend}%" title="Outgoing · KES ${money(d.spend)}"></div>
        </div>
        <div class="bar-label">${d.m}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function bindOtp(){
  const boxes = Array.from(document.querySelectorAll('.otp-box'));
  boxes.forEach((box, idx)=>{
    box.addEventListener('input', (e)=>{
      const v = e.target.value.replace(/[^0-9]/g,'').slice(-1);
      e.target.value = v;
      state.otp[idx] = v;
      if(v && boxes[idx+1]) boxes[idx+1].focus();
    });
    box.addEventListener('keydown', (e)=>{
      if(e.key==='Backspace' && !e.target.value && boxes[idx-1]){ boxes[idx-1].focus(); }
    });
  });
  document.getElementById('btn-verify').addEventListener('click', ()=>{
    state.stage = 'app';
    state.page = 'dashboard';
    render();

      <div class="form-grid">
        <div><label class="flabel">Default payment mode</label><input class="finput plain" value="Wallet"/></div>
        <div><label class="flabel">M-Pesa withdrawal phone</label><input class="finput" value="+254 712 000 441"/></div>
      </div>
      ${isIndividual() ? '' : `
      <div class="list-row" style="margin-top:10px;">
        <div><div class="lname">Approval required on withdrawals</div><div class="lmeta">Sends withdrawals through the maker · checker queue.</div></div>
        <div class="toggle on" data-toggle-simple="approval"><span class="knob"></span></div>
      </div>`}
    </div>`;
  }
  if(state.settingsTab==='Notifications'){
    const rows = ['Due payment reminders','Batch submitted','Batch approved or rejected','Payment success','Payment failure']
      .filter(r=> !(isIndividual() && (r==='Batch submitted' || r==='Batch approved or rejected')));
    return `
    <div class="card">
      <h3 style="font-size:16px; margin-bottom:2px;">Notifications</h3>
      <div class="desc" style="margin-bottom:14px;">What we alert you about.</div>
      ${rows.map((r,i)=>`
        <div class="list-row">
          <div class="lname">${r}</div>
          <div style="display:flex; gap:18px; align-items:center;">
            <div style="display:flex; align-items:center; gap:8px;"><div class="toggle on" data-toggle-simple="n${i}e"><span class="knob"></span></div><span class="cell-sub">Email</span></div>
            <div style="display:flex; align-items:center; gap:8px;"><div class="toggle on" data-toggle-simple="n${i}p"><span class="knob"></span></div><span class="cell-sub">Push</span></div>
          </div>
        </div>`).join('')}
    </div>`;
  }
  return `
  <div class="card">
    <h3 style="font-size:16px; margin-bottom:2px;">Organization</h3>
    <div class="desc" style="margin-bottom:18px;">Details shared across your team's workspace.</div>
    <div class="form-grid">
      <div><label class="flabel">Organization name</label><input class="finput plain" value="Solaris Logistics Ltd"/></div>
      <div><label class="flabel">Registration number</label><input class="finput" value="PVT-2019-004821"/></div>
    </div>
  </div>`;
}

/* ============================ BINDINGS ============================ */
function bindApp(){
  document.querySelectorAll('[data-page]').forEach(node=>{
    node.addEventListener('click', ()=>{ state.page = node.getAttribute('data-page'); state.sidebarOpen=false; render(); });
  });
  document.getElementById('hamburger')?.addEventListener('click', ()=>{ state.sidebarOpen = !state.sidebarOpen; render(); });
  document.getElementById('overlay')?.addEventListener('click', ()=>{ state.sidebarOpen=false; render(); });

  const roleSel = document.getElementById('role-select');
  roleSel?.addEventListener('click', (e)=>{ e.stopPropagation(); state.roleMenuOpen = !state.roleMenuOpen; render(); });
  document.querySelectorAll('[data-role]').forEach(o=>{
    o.addEventListener('click', ()=>{
      state.role = o.getAttribute('data-role'); state.roleMenuOpen=false;
      if(isIndividual()){
        if(['members','approvals','integrations'].includes(state.page)) state.page = 'dashboard';
        if(state.settingsTab === 'Organization') state.settingsTab = 'Profile';
      }
      render();
      toast('Preview role set to '+state.role+'.');
    });
  });
  document.addEventListener('click', ()=>{ if(state.roleMenuOpen){ state.roleMenuOpen=false; render(); } }, {once:true});

  document.querySelectorAll('[data-toast]').forEach(node=>{
    node.addEventListener('click', ()=> toast(node.getAttribute('data-toast')));
  });

  // Payees
  document.querySelectorAll('[data-filter]').forEach(c=>{
    c.addEventListener('click', ()=>{ state.payeeFilter = c.getAttribute('data-filter'); render(); });
  });
  const psearch = document.getElementById('payee-search');
  psearch?.addEventListener('input', (e)=>{ state.payeeSearch = e.target.value; render(); setTimeout(()=>{ const f=document.getElementById('payee-search'); if(f){f.focus(); f.setSelectionRange(f.value.length,f.value.length);} },0); });

  // Recurring toggles
  document.querySelectorAll('[data-toggle-recurring]').forEach(t=>{
    t.addEventListener('click', ()=>{
      const i = Number(t.getAttribute('data-toggle-recurring'));
      recurringData[i].active = !recurringData[i].active;
      render();
      toast(recurringData[i].payee + (recurringData[i].active? ' schedule turned on.' : ' schedule paused.'));
    });
  });

  // Generic simple toggles (settings)
  document.querySelectorAll('[data-toggle-simple]').forEach(t=>{
    t.addEventListener('click', ()=>{ t.classList.toggle('on'); });
  });

  // Quick pay
  const qpAmount = document.getElementById('qp-amount');
  qpAmount?.addEventListener('input', (e)=>{ state.quickPayAmount = e.target.value; render(); setTimeout(()=>{ const f=document.getElementById('qp-amount'); if(f) f.focus(); },0); });
  document.querySelectorAll('[data-mode]').forEach(m=>{
    m.addEventListener('click', ()=>{ state.quickPayMode = m.getAttribute('data-mode'); render(); });
  });
  document.getElementById('btn-send-payment')?.addEventListener('click', ()=> toast('Payment queued for processing.'));

  // Approvals
  document.querySelectorAll('[data-approval]').forEach(b=>{
    b.addEventListener('click', ()=>{ state.selectedApproval = Number(b.getAttribute('data-approval')); render(); });
  });
  document.getElementById('btn-approve')?.addEventListener('click', ()=>{
    const sel = approvalsQueue.find(a=>a.id===state.selectedApproval);
    approvalsQueue = approvalsQueue.filter(a=>a.id!==state.selectedApproval);
    state.selectedApproval = approvalsQueue.length? approvalsQueue[0].id : null;
    render();
    toast((sel?sel.name:'Batch') + ' approved and released for payout.');
  });
  document.getElementById('btn-reject')?.addEventListener('click', ()=>{
    const sel = approvalsQueue.find(a=>a.id===state.selectedApproval);
    approvalsQueue = approvalsQueue.filter(a=>a.id!==state.selectedApproval);
    state.selectedApproval = approvalsQueue.length? approvalsQueue[0].id : null;
    render();
    toast((sel?sel.name:'Batch') + ' sent back to the maker.', 'err');
  });

  // Settings tabs
  document.querySelectorAll('[data-tab]').forEach(t=>{
    t.addEventListener('click', ()=>{ state.settingsTab = t.getAttribute('data-tab'); render(); });
  });
  document.getElementById('btn-save-profile')?.addEventListener('click', ()=> toast('Profile changes saved.'));
  document.getElementById('btn-generate')?.addEventListener('click', ()=> toast('Report is generating — it will appear under Recent exports.'));
}

render();
</script>
</body>
</html>
